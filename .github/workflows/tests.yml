name: Build bottles

on:
  workflow_run:
    workflows: ["Update Homebrew formula"]
    types: [completed]
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula to bottle (e.g. bobi)"
        default: "bobi"

jobs:
  bottle:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-14]
    runs-on: ${{ matrix.os }}
    # Harden cargo network access against transient crates.io flakes (e.g.
    # "curl [16] Error in the HTTP2 framing layer") that abort the maturin
    # builds of Rust-backed resources (cryptography, pydantic-core, ...).
    env:
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_MULTIPLEXING: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew tap moda-labs/bobi-agent "$(pwd)"

      - name: Harden cargo network
        run: |
          # Homebrew's build sandbox may drop env vars, so also persist the
          # retry/HTTP-1.1 settings to cargo's on-disk config, which cargo
          # always reads. HTTP/2 multiplexing off avoids framing-layer errors;
          # retry covers the rest of the transient download failures.
          CARGO_DIR="${CARGO_HOME:-$HOME/.cargo}"
          mkdir -p "$CARGO_DIR"
          cat >> "$CARGO_DIR/config.toml" <<'EOF'

          [net]
          retry = 10

          [http]
          multiplexing = false
          EOF

      - name: Select formula
        id: formula
        run: |
          FORMULA="${{ github.event.inputs.formula }}"
          if [ -z "$FORMULA" ]; then
            FORMULA=bobi
          fi
          echo "formula=$FORMULA" >> "$GITHUB_OUTPUT"
          if [ -f "Formula/${FORMULA}.rb" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Formula/${FORMULA}.rb does not exist."
            exit 1
          fi

      - name: Build bottle
        run: |
          FORMULA="${{ steps.formula.outputs.formula }}"
          brew install --build-bottle --verbose "moda-labs/bobi-agent/${FORMULA}" 2>&1 || {
            echo "=== Homebrew install failed. Dumping logs ==="
            find ~/Library/Logs/Homebrew/"${FORMULA}"/ -type f -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null
            exit 1
          }
          brew bottle --no-rebuild --json "moda-labs/bobi-agent/${FORMULA}"
          ls -la *.bottle.*

      - name: Upload bottle
        uses: actions/upload-artifact@v4
        with:
          name: bottle_${{ matrix.os }}
          path: |
            *.bottle.tar.gz
            *.bottle.json
