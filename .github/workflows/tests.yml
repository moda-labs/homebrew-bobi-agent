name: Build bottles

on:
  workflow_run:
    workflows: ["Update Homebrew formula"]
    types: [completed]
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula to bottle (e.g. modastack)"
        default: "modastack"

jobs:
  bottle:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      matrix:
        os: [macos-15, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew tap moda-labs/modastack "$(pwd)"

      - name: Build bottle
        run: |
          brew install --build-bottle --verbose moda-labs/modastack/modastack 2>&1 || {
            echo "=== Homebrew install failed. Dumping logs ==="
            find ~/Library/Logs/Homebrew/modastack/ -type f -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null
            exit 1
          }
          brew bottle --no-rebuild --json moda-labs/modastack/modastack
          ls -la *.bottle.*

      - name: Upload bottle
        uses: actions/upload-artifact@v4
        with:
          name: bottle_${{ matrix.os }}
          path: |
            *.bottle.tar.gz
            *.bottle.json
