name: Build bottles

on:
  pull_request:
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula to bottle (e.g. modastack)"
        default: "modastack"

jobs:
  bottle:
    strategy:
      matrix:
        os: [macos-15, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew tap moda-labs/modastack "$(pwd)"

      - name: Build bottle
        run: |
          brew install --build-bottle moda-labs/modastack/modastack
          brew bottle --no-rebuild --json moda-labs/modastack/modastack
          ls -la *.bottle.*

      - name: Upload bottle
        uses: actions/upload-artifact@v4
        with:
          name: bottle_${{ matrix.os }}
          path: |
            *.bottle.tar.gz
            *.bottle.json
