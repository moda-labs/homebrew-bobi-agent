name: Update Homebrew formula

on:
  repository_dispatch:
    types: [pypi-release]
  workflow_dispatch:
    inputs:
      version:
        description: "PyPI version to update to (e.g. 0.5.0)"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version and SHA
        id: pypi
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          URL="https://files.pythonhosted.org/packages/source/m/modastack/modastack-${VERSION}.tar.gz"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

          # Retry until PyPI serves the real file (not empty/404)
          for i in 1 2 3 4 5; do
            SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
            EMPTY_SHA="e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
            if [ "$SHA" != "$EMPTY_SHA" ]; then
              echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i: PyPI not ready yet, waiting 30s..."
            sleep 30
          done
          echo "::error::Failed to download tarball after 5 attempts"
          exit 1

      - name: Update formula
        run: |
          sed -i "s|url \".*\"|url \"${{ steps.pypi.outputs.url }}\"|" Formula/modastack.rb
          # Update only the source sha256 (first occurrence, before any bottle block)
          sed -i '0,/sha256 ".*"/{s|sha256 ".*"|sha256 "${{ steps.pypi.outputs.sha256 }}"|;}' Formula/modastack.rb
          # Remove old bottle block — new bottles will be built by test-bot
          sed -i '/^  bottle do$/,/^  end$/d' Formula/modastack.rb

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.pypi.outputs.version }}"
          BRANCH="update-modastack-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Formula/modastack.rb
          git diff --staged --quiet && { echo "No changes"; exit 0; }
          git commit -m "modastack ${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "modastack ${VERSION}" \
            --body "Update modastack to ${VERSION}. Bottles will be built by test-bot." \
            --base main \
            --head "$BRANCH"
