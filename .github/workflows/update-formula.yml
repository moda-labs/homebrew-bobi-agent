name: Update Homebrew formula

on:
  repository_dispatch:
    types: [pypi-release]
  workflow_dispatch:
    inputs:
      version:
        description: "PyPI version to update to (e.g. 0.35.0)"
        required: true

jobs:
  update:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI availability
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for i in $(seq 1 10); do
            if pip index versions bobi 2>/dev/null | grep -q "$VERSION"; then
              echo "bobi $VERSION available on PyPI"
              exit 0
            fi
            echo "Waiting for PyPI... ($i/10)"
            sleep 30
          done
          echo "::error::bobi $VERSION not found on PyPI"
          exit 1

      - name: Generate updated formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          pip install "bobi==${VERSION}"
          mkdir -p Formula
          python3 scripts/update-formula.py "$VERSION" > Formula/bobi.rb
          echo "--- Generated formula ---"
          cat Formula/bobi.rb

      - name: Push to main
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A Formula
          git diff --staged --quiet && { echo "No changes"; exit 0; }
          git commit -m "bobi ${VERSION}"
          git push
