name: Publish bottles

on:
  workflow_run:
    workflows: ["Build bottles"]
    types: [completed]

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all bottle artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          merge-multiple: true

      - name: Extract version
        id: version
        # Bottle files are named `modastack--<version>.<os_tag>.bottle.tar.gz`
        # (e.g. modastack--0.33.0.arm64_sequoia.bottle.tar.gz). Strip the
        # `modastack-`/`modastack--` prefix and the `.<os_tag>.bottle.tar.gz`
        # suffix to recover just `<version>`. The previous extraction used a
        # greedy `.*` that captured everything up to the LAST dot, leaking the
        # OS/bottle suffix into the version (and thus into the release TAG and
        # bottle root_url) — see moda-labs/modastack#493.
        run: |
          VERSION=$(ls *.bottle.tar.gz | head -1 \
            | sed -E 's/^modastack-{1,2}//; s/\.[a-z0-9_]+\.bottle\.tar\.gz$//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename bottles to the canonical (single-dash) filename
        # `brew bottle` writes local files with a DOUBLE dash
        # (modastack--<v>...), but `brew install` from a GitHub *Releases*
        # root_url requests the SINGLE-dash form (modastack-<v>...). Upload the
        # name brew actually fetches, or the install 404s — moda-labs/modastack#493.
        run: |
          for f in modastack--*.bottle.tar.gz; do
            [ -e "$f" ] || continue
            mv "$f" "${f/modastack--/modastack-}"
          done
          ls -la *.bottle.tar.gz

      - name: Create release and upload bottles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="modastack-${{ steps.version.outputs.version }}"
          gh release create "$TAG" --title "$TAG" --notes "Bottles for modastack ${{ steps.version.outputs.version }}" modastack-*.bottle.tar.gz || \
          gh release upload "$TAG" modastack-*.bottle.tar.gz --clobber

      - name: Update formula with bottle block
        run: |
          TAG="modastack-${{ steps.version.outputs.version }}"
          ROOT_URL="https://github.com/moda-labs/homebrew-modastack/releases/download/${TAG}"

          BOTTLE_BLOCK="  bottle do\n    root_url \"${ROOT_URL}\"\n"
          for json in *.bottle.json; do
            CELLAR=$(python3 -c "import json; d=json.load(open('$json')); k=list(d.keys())[0]; t=list(d[k]['bottle']['tags'].keys())[0]; print(d[k]['bottle']['tags'][t].get('cellar', ':any_skip_relocation'))")
            TAG_NAME=$(python3 -c "import json; d=json.load(open('$json')); k=list(d.keys())[0]; print(list(d[k]['bottle']['tags'].keys())[0])")
            SHA=$(python3 -c "import json; d=json.load(open('$json')); k=list(d.keys())[0]; t=list(d[k]['bottle']['tags'].keys())[0]; print(d[k]['bottle']['tags'][t]['sha256'])")
            BOTTLE_BLOCK="${BOTTLE_BLOCK}    sha256 cellar: ${CELLAR}, ${TAG_NAME}: \"${SHA}\"\n"
          done
          BOTTLE_BLOCK="${BOTTLE_BLOCK}  end"

          # Remove existing bottle block if present
          sed -i '/^  bottle do$/,/^  end$/d' Formula/modastack.rb
          # Insert bottle block after license line
          sed -i "/^  license/a\\
          ${BOTTLE_BLOCK}" Formula/modastack.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/modastack.rb
          git diff --staged --quiet || git commit -m "add bottles for modastack ${{ steps.version.outputs.version }}"
          git push

      - name: Smoke-check bottle URLs (release gate)
        # Build the EXACT URL `brew install` will request for each bottled
        # platform and HEAD-check it. A malformed tag or a filename-convention
        # mismatch fails the publish here instead of reaching users —
        # moda-labs/modastack#493.
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ROOT_URL="https://github.com/moda-labs/homebrew-modastack/releases/download/modastack-${VERSION}"
          fail=0
          for json in *.bottle.json; do
            TAG_NAME=$(python3 -c "import json; d=json.load(open('$json')); k=list(d.keys())[0]; print(list(d[k]['bottle']['tags'].keys())[0])")
            URL="${ROOT_URL}/modastack-${VERSION}.${TAG_NAME}.bottle.tar.gz"
            CODE=""
            # Asset propagation after upload can lag a few seconds; retry briefly.
            for i in $(seq 1 6); do
              CODE=$(curl -sIL -o /dev/null -w '%{http_code}' "$URL")
              [ "$CODE" = "200" ] && break
              sleep 5
            done
            if [ "$CODE" = "200" ]; then
              echo "OK   $URL"
            else
              echo "::error::bottle URL not reachable (HTTP $CODE): $URL"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more modastack ${VERSION} bottle URLs are unreachable — see moda-labs/modastack#493."
            exit 1
          fi
