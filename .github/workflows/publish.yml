name: Publish bottles

on:
  workflow_run:
    workflows: ["Build bottles"]
    types: [completed]

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'workflow_run'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all bottle artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          merge-multiple: true

      - name: Extract version
        id: version
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          import re
          import sys

          versions = set()
          formulae = set()
          for bottle in Path(".").glob("*.bottle.tar.gz"):
              match = re.match(r"^(?P<formula>.+)--(?P<version>.+?)\.[^.]+\.bottle\.tar\.gz$", bottle.name)
              if not match:
                  print(f"Unexpected bottle filename: {bottle.name}", file=sys.stderr)
                  sys.exit(1)
              formulae.add(match.group("formula"))
              versions.add(match.group("version"))

          if len(formulae) != 1 or len(versions) != 1:
              print(
                  f"Expected exactly one formula/version, found formulae={sorted(formulae)} versions={sorted(versions)}",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"formula={formulae.pop()}")
          print(f"version={versions.pop()}")
          PY

      - name: Normalize bottle asset names
        run: |
          FORMULA="${{ steps.version.outputs.formula }}"
          for bottle in "${FORMULA}"--*.bottle.tar.gz; do
            [ -e "$bottle" ] || continue
            mv "$bottle" "${bottle/${FORMULA}--/${FORMULA}-}"
          done

      - name: Create release and upload bottles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FORMULA="${{ steps.version.outputs.formula }}"
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${FORMULA}-${VERSION}"
          gh release create "$TAG" --title "$TAG" --notes "Bottles for ${FORMULA} ${VERSION}" *.bottle.tar.gz || \
          gh release upload "$TAG" *.bottle.tar.gz --clobber

      - name: Update formula with bottle block
        run: |
          FORMULA="${{ steps.version.outputs.formula }}"
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${FORMULA}-${VERSION}"
          ROOT_URL="https://github.com/moda-labs/homebrew-bobi-agent/releases/download/${TAG}"

          BOTTLE_BLOCK="  bottle do\n    root_url \"${ROOT_URL}\"\n"
          for json in *.bottle.json; do
            CELLAR=$(python3 -c "import json; d=json.load(open('$json')); k=list(d.keys())[0]; t=list(d[k]['bottle']['tags'].keys())[0]; print(d[k]['bottle']['tags'][t].get('cellar', ':any_skip_relocation'))")
            TAG_NAME=$(python3 -c "import json; d=json.load(open('$json')); k=list(d.keys())[0]; print(list(d[k]['bottle']['tags'].keys())[0])")
            SHA=$(python3 -c "import json; d=json.load(open('$json')); k=list(d.keys())[0]; t=list(d[k]['bottle']['tags'].keys())[0]; print(d[k]['bottle']['tags'][t]['sha256'])")
            BOTTLE_BLOCK="${BOTTLE_BLOCK}    sha256 cellar: ${CELLAR}, ${TAG_NAME}: \"${SHA}\"\n"
          done
          BOTTLE_BLOCK="${BOTTLE_BLOCK}  end"

          sed -i '/^  bottle do$/,/^  end$/d' "Formula/${FORMULA}.rb"
          sed -i "/^  license/a\\
          ${BOTTLE_BLOCK}" "Formula/${FORMULA}.rb"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA}.rb"
          git diff --staged --quiet || git commit -m "add bottles for ${FORMULA} ${VERSION} [skip ci]"
          git push
